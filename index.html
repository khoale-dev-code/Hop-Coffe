<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon / Logo tab trình duyệt -->
    <link rel="icon" type="image/svg+xml" href="/hoplogo.svg" />
    <link rel="alternate icon" type="image/jpeg" href="/hoplogo.jpg" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Basic SEO -->
    <title>Hớp Coffee Menu | Menu Online F&B</title>
    <meta
      name="description"
      content="Hớp Coffee Menu - Website menu online cho quán cafe, tiệm nước và đồ ăn vặt. Xem menu, khuyến mãi, gọi quán và chỉ đường nhanh chóng."
    />
    <meta
      name="keywords"
      content="Hớp Coffee, menu online, F&B menu, cafe menu, menu quán nước, menu QR"
    />
    <meta name="author" content="Hớp Coffee" />

    <!-- Theme color mobile browser -->
    <meta name="theme-color" content="#F8F2EA" />

    <!-- Open Graph khi chia sẻ link Facebook/Zalo -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Hớp Coffee Menu" />
    <meta
      property="og:description"
      content="Xem menu online, khuyến mãi, gọi quán và mở Google Maps nhanh chóng."
    />
    <meta property="og:image" content="/hoplogo.jpg" />
    <meta property="og:site_name" content="Hớp Coffee Menu" />

    <!-- Twitter / Social preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hớp Coffee Menu" />
    <meta
      name="twitter:description"
      content="Website menu online dành cho quán cafe, tiệm nước và đồ ăn vặt."
    />
    <meta name="twitter:image" content="/hoplogo.jpg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
